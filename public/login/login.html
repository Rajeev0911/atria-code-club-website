<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="outer-div">
        <div class="inner-div">
            <div class="image-page"><img src="ACC_IMG.jpeg" alt="logo"></div>
            <div class="login-page">
                <div class="login-page-container">
                    <form action="">
                        <div class="login-div heading">
                            <h2>Login</h2>
                        </div>
                        <div class="login-div email">
                            <span>Email: <input type="text"></span>
                        </div>
                        <div class="login-div password">
                            <span>Password: <input type="text"></span>
                        </div>
                        <div class="login-div options">
                            <span><a href="">Forgot Password?</a></span>
                        </div>
                        <div class="login-div login-btn">
                            <button type="submit">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
