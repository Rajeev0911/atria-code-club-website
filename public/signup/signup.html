<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=ABeeZee&family=Barlow:wght@300&family=Bebas+Neue&family=Didact+Gothic&family=Heebo:wght@500&family=Inconsolata:wght@300&family=Inter&family=Manrope&family=Montserrat&family=Open+Sans&family=PT+Sans:ital@1&family=Quicksand:wght@300&family=Raleway:wght@200;300&family=Roboto+Mono:wght@300;400&family=Roboto:wght@300&family=Rubik:wght@300&family=Source+Code+Pro:wght@300&family=Work+Sans&family=Ysabeau+Infant:ital,wght@0,100;1,600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="main-body">
        <div class="inner-body">
            <div class="image-page">
                <div class="aec-name">ATRIA CODE CLUB</div>
                <div class="image"><img src="ACC_IMG.jpeg" alt="img"></div>
            </div>
            <div class="signup-page">
                <div class="signup-page-container">
                    <form action="/user_details.html" method="post" autocomplete="off">
                    <div class="heading"><span>Sign up</span></div>
                    <div class="details">
                        <div class="input-div"><span>Name:</span> <input class="input" id="name" type="text" name="username"></div>
                        <div class="input-div"><span>E-mail:</span> <input class="input" id="email" type="text" name="email"></div>
                        <div class="input-div"><span>Password:</span> <input class="input" id="password" type="text" name="password"></div>
                        <div class="input-div"><span>Institution:</span><input class="input" id="institution" type="text" name="institution"></div>
                    </div>
                    <div class="sign-up-btn"><button type="submit" id="submitbtn">Sign up</button></div>
                </form>
                    <div class="login-other-methods"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="signup.js"></script>

</body>

</html>
