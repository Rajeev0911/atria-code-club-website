<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=ABeeZee&family=Barlow:wght@300&family=Bebas+Neue&family=Didact+Gothic&family=Heebo:wght@500&family=Inconsolata:wght@300&family=Inter&family=Manrope&family=Montserrat&family=Open+Sans&family=PT+Sans:ital@1&family=Quicksand:wght@300&family=Raleway:wght@200;300&family=Roboto+Mono:wght@300;400&family=Roboto:wght@300&family=Rubik:wght@300&family=Source+Code+Pro:wght@300&family=Work+Sans&family=Ysabeau+Infant:ital,wght@0,100;1,600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="main-body">
        <div class="inner-body">
            <div class="image-page">
                <div class="aec-name">ATRIA CODE CLUB</div>
                <div class="image"><img src="ACC_IMG.jpeg" alt="img"></div>
            </div>
            <div class="login-page">
                <div class="login-page-container">
                    <div class="heading"><span>Sign up</span></div>
                    <div class="details">
                        <div class="input name"><span>Name:</span> <input type="text"></div>
                        <div class="input e-mail"><span>E-mail:</span> <input type="text"></div>
                        <div class="input password"><span>Password:</span> <input type="text"></div>
                        <div class="input institution"><span>Institution:</span><input type="text"></div>
                    </div>
                    <div class="log-in-btn"><button>Log in</button></div>
                    <div class="login-other-methods"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
