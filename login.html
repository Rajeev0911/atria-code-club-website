<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ABeeZee&family=Bebas+Neue&family=Didact+Gothic&family=Inter:wght@300&family=Manrope:wght@300&family=Montserrat:wght@300;400&family=Quicksand:wght@300&family=Raleway:wght@200;300&family=Roboto+Mono:wght@300;400&family=Source+Code+Pro:wght@300&family=Work+Sans&family=Ysabeau+Infant:ital,wght@0,100;1,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="outer-div">
        <div class="login-div">
            <div class="login-form">
                <div class="login-heading"><span>Login to Atria Code Club</span></div>
                <div class="first-name">
                   <span class="text">First Name:</span> <input class="box" type="text" placeholder="">
                </div>
                <div class="last-name">
                    <span class="text">Last Name:</span> <input class="box" type="text" placeholder="">
                </div>
                <div class="e-mail-address">
                    <span class="text">E-mail Address:</span> <input class="box" type="text" placeholder="">
                </div>
                <div class="password">
                    <span class="text">Password:</span> <input class="box" type="text" placeholder="">
                </div>
                <div class="institution">
                    <span class="text">Institution:</span> <input class="box" type="text" placeholder="">
                </div>
                <div class="buttons">
                    <button class="login-btn">Login</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
